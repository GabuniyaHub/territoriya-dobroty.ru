version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./backend/prisma:/app/prisma
      - ./frontend/public:/app/frontend/public
      - ./docs:/app/docs:ro
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=your_secret_key
      - ADMIN_EMAIL=admin@territoriya-dobroty.ru
      - ADMIN_PASSWORD=admin123
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/usr/share/nginx/public:ro
      - ./frontend/views:/usr/share/nginx/views:ro
      - ./docs:/usr/share/nginx/docs:ro
    depends_on:
      - backend
